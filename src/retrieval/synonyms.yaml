# OpenForge Electronics Synonym Dictionary
# Used for query expansion in vector search (Layer 3).
# All terms are lowercased. Expansion is bidirectional:
# if any term in a synonym group appears in the query,
# all others are added to the expanded query.
#
# Format:
#   canonical: <primary engineering term>
#   synonyms: [list of equivalent terms]
#
# Add new entries as the KB grows. Keep citations where possible.

