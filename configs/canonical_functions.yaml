# Canonical pin function vocabulary for OpenForge PCB Builder
# aliases: raw pin name -> normalized canonical function
# protocols: net-assignment groupings for schematic synthesis

aliases:
  '!EN': ENABLE_ACTIVE_LOW
  '!INT': INTERRUPT_ACTIVE_LOW
  '!RST': RESET_ACTIVE_LOW
  AGND: POWER_GROUND
  ANT: ANTENNA
  ANT_N: ANTENNA_NEGATIVE
  ANT_P: ANTENNA_POSITIVE
  AVDD: POWER_POSITIVE
  BCLK: BIT_CLOCK
  BOOT: BOOTSTRAP
  BST: BOOTSTRAP
  CANH: CAN_HIGH
  CANL: CAN_LOW
  CIPO: SPI_DATA_OUT
  CLK: SPI_CLOCK
  CLKIN: CLOCK_INPUT
  CLKOUT: CLOCK_OUTPUT
  COMP: COMPENSATION
  COPI: SPI_DATA_IN
  CS: SPI_CHIP_SELECT
  CSB: SPI_CHIP_SELECT
  CSN: SPI_CHIP_SELECT_ACTIVE_LOW
  CTRL: CONTROL
  CTS: UART_CTS
  D+: DATA_POSITIVE
  D-: DATA_NEGATIVE
  DGND: POWER_GROUND
  DI: SPI_DATA_IN
  DIM: DIMMING
  DM: DATA_NEGATIVE
  DNP: NO_CONNECT
  DO: SPI_DATA_OUT
  DP: DATA_POSITIVE
  DRIVER: GATE_DRIVER
  DSR: UART_DSR
  DTR: UART_DTR
  DVDD: POWER_POSITIVE
  EN: ENABLE
  ENABLE: ENABLE
  ENB: ENABLE
  EN_L: ENABLE_ACTIVE_LOW
  EN_N: ENABLE_ACTIVE_LOW
  FB: FEEDBACK
  FB+: FEEDBACK_POSITIVE
  FB-: FEEDBACK_NEGATIVE
  GATE: GATE_DRIVER
  GND: POWER_GROUND
  GPIO: GPIO
  HG: HIGH_SIDE_GATE
  HOLD: HOLD
  HOLD_N: HOLD_ACTIVE_LOW
  HS: HIGH_SIDE_GATE
  IFB: CURRENT_FEEDBACK
  ILIM: CURRENT_LIMIT
  IN+: ANALOG_INPUT_POSITIVE
  IN-: ANALOG_INPUT_NEGATIVE
  INN: ANALOG_INPUT_NEGATIVE
  INP: ANALOG_INPUT_POSITIVE
  INT: INTERRUPT
  INT_L: INTERRUPT_ACTIVE_LOW
  INT_N: INTERRUPT_ACTIVE_LOW
  IO: GPIO
  IRQ: INTERRUPT
  ISEN: CURRENT_SENSE
  ISENSE: CURRENT_SENSE
  ISNS: CURRENT_SENSE
  LG: LOW_SIDE_GATE
  LIN: LIN_BUS
  LRCK: LEFT_RIGHT_CLOCK
  LS: LOW_SIDE_GATE
  MCLK: MASTER_CLOCK
  MISO: SPI_DATA_OUT
  MODE: MODE_SELECT
  MOSI: SPI_DATA_IN
  N.C.: NO_CONNECT
  N/A: NO_CONNECT
  NC: NO_CONNECT
  NCS: SPI_CHIP_SELECT
  NMI: NON_MASKABLE_INTERRUPT
  NRST: RESET
  NSS: SPI_CHIP_SELECT
  OUT: ANALOG_OUTPUT
  OUT+: ANALOG_OUTPUT_POSITIVE
  OUT-: ANALOG_OUTPUT_NEGATIVE
  OUTN: ANALOG_OUTPUT_NEGATIVE
  OUTP: ANALOG_OUTPUT_POSITIVE
  PDN: POWER_DOWN
  PG: POWER_GOOD
  PGND: POWER_GROUND
  PGOOD: POWER_GOOD
  PHASE: SWITCH_NODE
  POR: POWER_ON_RESET
  PVDD: POWER_POSITIVE
  PWM: PWM_OUTPUT
  PWMOUT: PWM_OUTPUT
  PWRGD: POWER_GOOD
  PWR_EN: ENABLE
  RESET: RESET
  RFIN: RF_INPUT
  RF_N: RF_NEGATIVE
  RF_OUT: RF_OUTPUT
  RF_OUT_N: RF_OUTPUT_NEGATIVE
  RF_OUT_P: RF_OUTPUT_POSITIVE
  RF_P: RF_POSITIVE
  RST: RESET
  RST_L: RESET_ACTIVE_LOW
  RST_N: RESET_ACTIVE_LOW
  RTS: UART_RTS
  RX: UART_RECEIVE
  RXD: UART_RECEIVE
  SCK: SPI_CLOCK
  SCL: I2C_CLOCK
  SCLK: SPI_CLOCK
  SCS: SPI_CHIP_SELECT
  SDA: I2C_DATA
  SDI: SPI_DATA_IN
  SDO: SPI_DATA_OUT
  SEL: SELECT
  SGND: POWER_GROUND
  SHDN: SHUTDOWN
  SHUTDOWN: SHUTDOWN
  SI: SPI_DATA_IN
  SO: SPI_DATA_OUT
  SPCK: SPI_CLOCK
  SS: SPI_CHIP_SELECT
  SW: SWITCH_NODE
  SWCLK: SWD_CLOCK
  SWDIO: SWD_DATA
  SWITCH: SWITCH_NODE
  SWO: SWD_OUTPUT
  SYNC: SYNCHRONIZATION
  TCK: JTAG_CLOCK
  TDI: JTAG_DATA_IN
  TDO: JTAG_DATA_OUT
  TMS: JTAG_MODE_SELECT
  TRST: JTAG_RESET
  TX: UART_TRANSMIT
  TXD: UART_TRANSMIT
  UART_RX: UART_RECEIVE
  UART_TX: UART_TRANSMIT
  V+: POWER_POSITIVE
  V-: POWER_GROUND
  VBAT: POWER_POSITIVE
  VBUS: POWER_BUS
  VCC: POWER_POSITIVE
  VDD: POWER_POSITIVE
  VEE: POWER_GROUND
  VFB: VOLTAGE_FEEDBACK
  VIN: POWER_INPUT
  VIN+: POWER_INPUT_POSITIVE
  VIN-: POWER_INPUT_NEGATIVE
  VIN_N: POWER_INPUT_NEGATIVE
  VIN_P: POWER_INPUT_POSITIVE
  VIO: POWER_POSITIVE
  VN: POWER_GROUND
  VPOS: POWER_POSITIVE
  VREF: VOLTAGE_REFERENCE
  VREFN: VOLTAGE_REFERENCE_NEGATIVE
  VREFP: VOLTAGE_REFERENCE_POSITIVE
  VSENSE: POWER_SENSE
  VSS: POWER_GROUND
  VSW: POWER_SWITCH
  VSYS: POWER_SYSTEM
  VUSB: POWER_USB
  WCLK: WORD_CLOCK
  WP: WRITE_PROTECT
  XIN: CRYSTAL_INPUT
  XOUT: CRYSTAL_OUTPUT
  XTAL: CRYSTAL
protocols:
  SPI:
    shared:
    - SPI_CLOCK
    - SPI_DATA_IN
    - SPI_DATA_OUT
    unique:
    - SPI_CHIP_SELECT
  I2C:
    shared:
    - I2C_DATA
    - I2C_CLOCK
    unique: []
  UART:
    crossover:
    - - UART_TRANSMIT
      - UART_RECEIVE
    unique: []
